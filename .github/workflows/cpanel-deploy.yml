name: Deploy Portfolio to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.9.0'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Error: .next/ directory not found!"
            exit 1
          fi

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -R .next deploy/. 
          cp -R public deploy/. 
          cp package.json package-lock.json next.config.mjs deploy/.

      - name: Verify deploy folder
        run: |
          if [ ! -d "deploy/.next" ]; then
            echo "Error: deploy/.next/ directory not found!"
            exit 1
          fi

      - name: Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: /public_html/rakalam/
          exclude: |
            .DS_Store
